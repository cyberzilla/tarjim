<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Translator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        /* Kustomisasi Scrollbar agar elegan */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-indigo-50 to-slate-200 min-h-screen font-sans text-slate-800 pb-12 antialiased selection:bg-brand-100 selection:text-brand-900">

<header class="w-full pt-10 pb-6 px-6 text-center">
    <div class="inline-block">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-brand-600 to-violet-600 mb-3 drop-shadow-sm">
            Gemini Translator Pro
        </h1>
        <p class="text-slate-500 font-medium max-w-2xl mx-auto">
            Asisten AI cerdas untuk penerjemahan kitab & dokumen. Auto-Pilot, Konteks Bersambung, dan Auto-Save JSON.
        </p>
    </div>
</header>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

        <div class="lg:col-span-5 space-y-6">

            <div class="glass-panel rounded-2xl p-6 shadow-xl shadow-slate-200/50 transition-all duration-300 hover:shadow-2xl">
                <div class="flex justify-between items-center mb-5">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        Kredensial API
                    </h2>
                    <div class="flex gap-2">
                        <input type="file" id="importSettingsInput" accept=".json" class="hidden" onchange="importSettings(event)">
                        <button onclick="document.getElementById('importSettingsInput').click()" class="text-xs font-semibold bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 py-1.5 px-3 rounded-lg transition shadow-sm" title="Impor Pengaturan">
                            ⬇️ Impor
                        </button>
                        <button onclick="exportSettings()" class="text-xs font-semibold bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 py-1.5 px-3 rounded-lg transition shadow-sm" title="Ekspor Pengaturan">
                            ⬆️ Ekspor
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">API Key Aktif</label>
                        <div class="flex gap-2">
                            <select id="savedApiKeys" onchange="changeActiveApiKey()" class="w-full text-sm p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
                                <option value="">-- Belum ada API Key --</option>
                            </select>
                            <button onclick="deleteApiKey()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-100 font-medium py-2 px-3 rounded-xl transition" title="Hapus Key">Hapus</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Tambah API Key</label>
                        <div class="flex gap-2">
                            <input type="password" id="newApiKey" placeholder="Tempel key baru..."
                                   class="w-full text-sm p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition placeholder-slate-400">
                            <button onclick="addApiKey()" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-4 rounded-xl transition shadow-sm">Simpan</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6 shadow-xl shadow-slate-200/50 transition-all duration-300 hover:shadow-2xl">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-5">
                    <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Konfigurasi Dokumen
                </h2>

                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">Model AI</label>
                            <button onclick="loadModels()" id="btnLoadModels" class="text-[10px] font-bold text-brand-600 hover:text-brand-800">Muat Ulang</button>
                        </div>
                        <select id="modelSelect" onchange="saveSelectedModel()" disabled
                                class="w-full text-sm p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition disabled:opacity-60">
                            <option value="">-- Muat model terlebih dahulu --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Pilih File (PDF + JSON Terjemahan)</label>
                        <div class="relative group">
                            <input type="file" id="fileInput" accept=".pdf, image/png, image/jpeg, image/webp, .json" multiple onchange="handleFileUpload(event)"
                                   class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-700 hover:file:bg-brand-100 cursor-pointer bg-slate-50 border border-slate-200 rounded-xl transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Gaya Bahasa</label>
                        <select id="styleSelect" class="w-full text-sm p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none transition">
                            <option value="klasik">Bahasa Klasik / Kitab Agama (Sesuai Konteks)</option>
                            <option value="baku">Bahasa Indonesia Baku (EYD)</option>
                            <option value="sastrawan">Bahasa Sastrawan (Puitis)</option>
                            <option value="gaul">Bahasa Gaul (Sehari-hari)</option>
                            <option value="genz">Bahasa Gen Z (Modern Slang)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="translateBtn" onclick="processTranslation()" disabled
                        class="w-full bg-white border border-slate-200 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed text-slate-700 font-bold py-3.5 px-4 rounded-2xl transition duration-200 shadow-sm flex justify-center items-center gap-2 group">
                    <span id="btnIcon" class="text-xl group-hover:scale-110 transition">⚡</span>
                    <span id="btnText">Terjemahkan Halaman Ini</span>
                </button>

                <button id="autoTranslateBtn" onclick="toggleAutoTranslate()" disabled
                        class="w-full bg-gradient-to-r from-brand-600 to-violet-600 hover:from-brand-500 hover:to-violet-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 px-4 rounded-2xl transition-all duration-300 shadow-lg shadow-brand-500/30 flex justify-center items-center gap-2 transform hover:-translate-y-0.5 hidden">
                    <span class="text-xl">🤖</span>
                    <span id="autoBtnText">Mulai Auto-Pilot</span>
                </button>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col space-y-6">

            <div class="glass-panel rounded-2xl p-6 shadow-xl shadow-slate-200/50 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wide">Pratinjau Dokumen</h3>
                    <span id="pageTranslatedBadge" class="hidden px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full border border-emerald-200 shadow-sm transition">
                            ✅ Tersimpan
                        </span>
                </div>

                <div class="w-full bg-slate-100/50 rounded-xl border border-slate-200 flex justify-center items-center overflow-hidden min-h-[350px] relative shadow-inner">
                    <canvas id="documentPreview" class="max-w-full max-h-[500px] object-contain hidden rounded"></canvas>
                    <div id="previewPlaceholder" class="text-center">
                        <svg class="mx-auto h-12 w-12 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-slate-400 text-sm font-medium">Dokumen akan muncul di sini</p>
                    </div>
                </div>

                <div id="pdfControls" class="hidden flex justify-between items-center mt-5 bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                    <button onclick="prevPage()" id="prevBtn" class="bg-slate-50 hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg transition font-bold disabled:opacity-40 disabled:cursor-not-allowed text-sm">← Prev</button>
                    <span id="pageInfo" class="font-bold text-slate-600 text-sm tracking-wide">Hal 1 / ?</span>
                    <button onclick="nextPage()" id="nextBtn" class="bg-slate-50 hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg transition font-bold disabled:opacity-40 disabled:cursor-not-allowed text-sm">Next →</button>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-6 shadow-xl shadow-slate-200/50 flex flex-col flex-grow relative">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-sm font-bold text-slate-800 uppercase tracking-wide">Hasil Terjemahan</label>

                    <div class="flex gap-2">
                        <button onclick="copyToClipboard()" id="copyBtn" class="text-xs font-bold bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 py-1.5 px-3 rounded-lg transition shadow-sm">
                            📋 Salin
                        </button>
                        <button onclick="downloadJSON()" id="downloadBtn" class="text-xs font-bold bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 text-emerald-700 py-1.5 px-3 rounded-lg transition shadow-sm">
                            ⬇️ Unduh JSON
                        </button>
                    </div>
                </div>

                <div id="loadingIndicator" class="hidden absolute inset-0 z-10 bg-white/80 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center">
                    <div class="bg-white p-6 rounded-2xl shadow-xl border border-indigo-100 text-center">
                        <svg class="animate-spin mx-auto h-10 w-10 text-brand-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="loadingText" class="block font-bold text-lg text-slate-800 mb-1">Memproses...</span>
                        <span id="loadingSubText" class="block text-sm text-brand-600 font-medium"></span>
                    </div>
                </div>

                <div id="errorMessage" class="hidden mb-4 p-4 bg-red-50 text-red-700 rounded-xl border border-red-200 text-sm font-medium"></div>

                <textarea id="outputArea" placeholder="Hasil terjemahan akan otomatis termuat dan tersimpan ke JSON saat Anda berpindah halaman."
                          class="w-full flex-grow p-5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:bg-white outline-none transition resize-none text-slate-700 leading-relaxed min-h-[250px] shadow-inner"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    // INISIALISASI STATE & LOCAL STORAGE
    let apiKeys = JSON.parse(localStorage.getItem('geminiApiKeys')) || [];
    let activeKey = localStorage.getItem('geminiActiveKey') || '';
    let savedModel = localStorage.getItem('geminiSavedModel') || '';
    let allTranslations = JSON.parse(localStorage.getItem('geminiSavedTranslations')) || {};

    let currentFileName = '';
    let pdfDoc = null;
    let pageNum = 1;
    let currentFileType = '';
    let isAutoTranslating = false;

    window.onload = function() {
        updateApiKeyDropdown();
        if (activeKey) {
            document.getElementById('savedApiKeys').value = activeKey;
            loadModels();
        }
    };

    // ==========================================
    // EKSPOR & IMPOR PENGATURAN
    // ==========================================
    function exportSettings() {
        const settingsData = {
            tipe_file: 'pengaturan_gemini_spa',
            apiKeys: apiKeys,
            activeKey: activeKey,
            savedModel: savedModel
        };
        const jsonString = JSON.stringify(settingsData, null, 4);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `Backup_Pengaturan_Gemini.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async function importSettings(event) {
        const file = event.target.files[0];
        if (!file) return;

        try {
            const text = await file.text();
            const data = JSON.parse(text);

            if (data.tipe_file === 'pengaturan_gemini_spa') {
                if (data.apiKeys) apiKeys = data.apiKeys;
                if (data.activeKey) activeKey = data.activeKey;
                if (data.savedModel) savedModel = data.savedModel;

                localStorage.setItem('geminiApiKeys', JSON.stringify(apiKeys));
                localStorage.setItem('geminiActiveKey', activeKey);
                localStorage.setItem('geminiSavedModel', savedModel);

                updateApiKeyDropdown();
                if(activeKey) loadModels();
                alert(`✅ Pengaturan API & Model berhasil dipulihkan!`);
            } else {
                alert("❌ File JSON ini bukan file Pengaturan API yang valid.");
            }
        } catch (error) {
            console.error("Gagal membaca JSON:", error);
            alert("❌ File JSON tidak valid atau rusak.");
        }
        event.target.value = '';
    }

    async function importTranslationData(file) {
        try {
            const text = await file.text();
            const data = JSON.parse(text);

            if (data.nama_file && data.terjemahan_per_halaman) {
                allTranslations[data.nama_file] = data.terjemahan_per_halaman;
                localStorage.setItem('geminiSavedTranslations', JSON.stringify(allTranslations));
                alert(`✅ Memori terjemahan dimuat untuk: ${data.nama_file}`);
            }
        } catch (error) {
            console.error("Gagal membaca JSON Terjemahan:", error);
        }
    }

    // ==========================================
    // PENGELOLAAN API KEY & MODEL
    // ==========================================
    function updateApiKeyDropdown() {
        const select = document.getElementById('savedApiKeys');
        select.innerHTML = '';

        if (apiKeys.length === 0) {
            select.innerHTML = '<option value="">-- Belum ada API Key --</option>';
            return;
        }

        apiKeys.forEach((key, index) => {
            const option = document.createElement('option');
            option.value = key;
            const maskedKey = key.substring(0, 8) + '...' + key.substring(key.length - 4);
            // Tambahkan label "(Aktif)" jika sesuai
            option.textContent = `Key ${index + 1}: ${maskedKey} ${key === activeKey ? ' (Aktif)' : ''}`;
            select.appendChild(option);
        });
        // Pastikan nilai dropdown menunjuk ke API yang aktif
        document.getElementById('savedApiKeys').value = activeKey;
    }

    function addApiKey() {
        const newKeyInput = document.getElementById('newApiKey');
        const newKey = newKeyInput.value.trim();
        if (!newKey) return;

        if (!apiKeys.includes(newKey)) {
            apiKeys.push(newKey);
            localStorage.setItem('geminiApiKeys', JSON.stringify(apiKeys));

            // PERBAIKAN: Tidak lagi otomatis set sebagai activeKey
            // activeKey = newKey;
            // localStorage.setItem('geminiActiveKey', activeKey);

            updateApiKeyDropdown();
            newKeyInput.value = '';
            alert('✅ API Key berhasil ditambahkan. Silakan pilih dari dropdown untuk mengaktifkannya.');
        } else {
            alert('API Key ini sudah ada dalam daftar.');
        }
    }

    function deleteApiKey() {
        const select = document.getElementById('savedApiKeys');
        const keyToDelete = select.value;
        if (!keyToDelete) return;

        apiKeys = apiKeys.filter(key => key !== keyToDelete);
        localStorage.setItem('geminiApiKeys', JSON.stringify(apiKeys));

        if (apiKeys.length > 0) {
            activeKey = apiKeys[0];
            localStorage.setItem('geminiActiveKey', activeKey);
        } else {
            activeKey = '';
            localStorage.removeItem('geminiActiveKey');
            document.getElementById('modelSelect').innerHTML = '<option value="">-- Muat model terlebih dahulu --</option>';
            document.getElementById('modelSelect').disabled = true;
        }

        updateApiKeyDropdown();
        if (activeKey) loadModels();
    }

    function changeActiveApiKey() {
        const select = document.getElementById('savedApiKeys');
        if (select.value) {
            activeKey = select.value;
            localStorage.setItem('geminiActiveKey', activeKey);
            // Memperbarui UI agar teks "(Aktif)" berpindah
            updateApiKeyDropdown();
            loadModels();
        }
    }

    function switchToNextApiKey() {
        const currentIndex = apiKeys.indexOf(activeKey);
        if (currentIndex >= 0 && currentIndex < apiKeys.length - 1) {
            activeKey = apiKeys[currentIndex + 1];
            localStorage.setItem('geminiActiveKey', activeKey);
            updateApiKeyDropdown();
            return true;
        }
        return false;
    }

    function saveSelectedModel() {
        const select = document.getElementById('modelSelect');
        if (select.value) {
            savedModel = select.value;
            localStorage.setItem('geminiSavedModel', savedModel);
        }
    }

    async function loadModels() {
        const modelSelect = document.getElementById('modelSelect');
        if (!activeKey) return;
        modelSelect.innerHTML = '<option value="">Memuat model...</option>';
        modelSelect.disabled = true;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${activeKey}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || 'Gagal memuat model.');

            modelSelect.innerHTML = '';
            const validModels = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'));

            validModels.forEach(model => {
                const option = document.createElement('option');
                option.value = model.name;
                option.textContent = `${model.displayName}`;
                if (savedModel && model.name === savedModel) option.selected = true;
                else if (!savedModel && model.name.includes('flash')) option.selected = true;
                modelSelect.appendChild(option);
            });

            modelSelect.disabled = false;
            saveSelectedModel();
            checkReadyState();
        } catch (error) {
            modelSelect.innerHTML = '<option value="">Gagal memuat model</option>';
        }
    }

    // ==========================================
    // PENGELOLAAN UPLOAD FILE
    // ==========================================
    function checkReadyState() {
        const modelReady = document.getElementById('modelSelect').value !== '';
        const translateBtn = document.getElementById('translateBtn');
        const autoBtn = document.getElementById('autoTranslateBtn');

        translateBtn.disabled = !(modelReady && currentFileType !== '');

        if (modelReady && currentFileType === 'pdf') {
            autoBtn.classList.remove('hidden');
            autoBtn.disabled = false;
        } else {
            autoBtn.classList.add('hidden');
        }
    }

    async function handleFileUpload(event) {
        const files = Array.from(event.target.files);
        let mediaFile = null;

        for (const file of files) {
            if (file.type === 'application/json' || file.name.endsWith('.json')) {
                await importTranslationData(file);
            } else if (!mediaFile) {
                mediaFile = file;
            }
        }

        if (!mediaFile) return;

        currentFileName = mediaFile.name;
        if (!allTranslations[currentFileName]) {
            allTranslations[currentFileName] = {};
            localStorage.setItem('geminiSavedTranslations', JSON.stringify(allTranslations));
        }

        const canvas = document.getElementById('documentPreview');
        const placeholder = document.getElementById('previewPlaceholder');
        const pdfControls = document.getElementById('pdfControls');

        canvas.classList.remove('hidden');
        placeholder.classList.add('hidden');

        if (mediaFile.type === 'application/pdf') {
            currentFileType = 'pdf';
            pdfControls.classList.remove('hidden');

            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const loadingTask = pdfjsLib.getDocument(typedarray);
                pdfDoc = await loadingTask.promise;
                pageNum = 1;

                const savedPages = Object.keys(allTranslations[currentFileName]).map(Number);
                if(savedPages.length > 0) {
                    const maxSavedPage = Math.max(...savedPages);
                    if(maxSavedPage < pdfDoc.numPages) {
                        pageNum = maxSavedPage + 1;
                    } else {
                        pageNum = maxSavedPage;
                    }
                }

                await renderPage(pageNum);
                checkReadyState();
            };
            fileReader.readAsArrayBuffer(mediaFile);

        } else if (mediaFile.type.startsWith('image/')) {
            currentFileType = 'image';
            pdfControls.classList.add('hidden');
            pageNum = 1;

            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                checkSavedTranslation(pageNum);
                checkReadyState();
            }
            img.src = URL.createObjectURL(mediaFile);
        }
    }

    // ==========================================
    // RENDER PDF & NAVIGASI
    // ==========================================
    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const scale = 1.5;
        const viewport = page.getViewport({ scale: scale });

        const canvas = document.getElementById('documentPreview');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = { canvasContext: ctx, viewport: viewport };
        await page.render(renderContext).promise;

        document.getElementById('pageInfo').textContent = `Hal ${num} / ${pdfDoc.numPages}`;
        checkSavedTranslation(num);
    }

    async function prevPage() {
        if (pageNum <= 1 || isAutoTranslating) return;
        saveManualEdit();
        pageNum--;
        await renderPage(pageNum);
    }

    async function nextPage() {
        if (pageNum >= pdfDoc.numPages || isAutoTranslating) return;
        saveManualEdit();
        pageNum++;
        await renderPage(pageNum);
    }

    function saveManualEdit() {
        const outputArea = document.getElementById('outputArea');
        if (outputArea.value.trim() !== '' && currentFileName) {
            allTranslations[currentFileName][pageNum.toString()] = outputArea.value;
            localStorage.setItem('geminiSavedTranslations', JSON.stringify(allTranslations));
        }
    }

    function checkSavedTranslation(num) {
        const outputArea = document.getElementById('outputArea');
        const badge = document.getElementById('pageTranslatedBadge');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const translateBtn = document.getElementById('translateBtn');
        const pageKey = num.toString();

        if (allTranslations[currentFileName] && allTranslations[currentFileName][pageKey]) {
            outputArea.value = allTranslations[currentFileName][pageKey];
            badge.classList.remove('hidden');
            btnText.textContent = 'Terjemah Ulang Hal. Ini';
            btnIcon.textContent = '🔄';
            translateBtn.classList.add('text-orange-600', 'border-orange-200');
        } else {
            outputArea.value = '';
            badge.classList.add('hidden');
            btnText.textContent = 'Terjemahkan Halaman Ini';
            btnIcon.textContent = '⚡';
            translateBtn.classList.remove('text-orange-600', 'border-orange-200');
        }
    }

    // ==========================================
    // PROSES TERJEMAHAN (API GEMINI)
    // ==========================================
    const stylePrompts = {
        'klasik': 'Terjemahkan teks dari dokumen ini ke dalam Bahasa Indonesia dengan gaya bahasa teks keagamaan atau kitab klasik yang khidmat. SANGAT PENTING: Pertahankan struktur asli dan salin persis setiap tanda baca (koma, titik, titik dua, tanda seru, dsb). INSTRUKSI MUTLAK: HANYA BERIKAN HASIL TERJEMAHANNYA SAJA. Jangan tambahkan kata pengantar, basa-basi, atau kalimat pembuka.',
        'baku': 'Terjemahkan teks ke dalam Bahasa Indonesia baku (EYD). INSTRUKSI MUTLAK: HANYA BERIKAN HASIL TERJEMAHANNYA SAJA.',
        'sastrawan': 'Terjemahkan menggunakan gaya bahasa sastrawan yang puitis. INSTRUKSI MUTLAK: HANYA BERIKAN HASIL TERJEMAHANNYA SAJA.',
        'gaul': 'Terjemahkan menggunakan bahasa gaul sehari-hari. INSTRUKSI MUTLAK: HANYA BERIKAN HASIL TERJEMAHANNYA SAJA.',
        'genz': 'Terjemahkan menggunakan bahasa anak Gen Z masa kini. INSTRUKSI MUTLAK: HANYA BERIKAN HASIL TERJEMAHANNYA SAJA.'
    };

    async function processTranslation() {
        const selectedModel = document.getElementById('modelSelect').value;
        const styleSelect = document.getElementById('styleSelect').value;
        const outputArea = document.getElementById('outputArea');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const loadingText = document.getElementById('loadingText');
        const loadingSubText = document.getElementById('loadingSubText');
        const canvas = document.getElementById('documentPreview');

        errorMessage.classList.add('hidden');
        loadingIndicator.classList.remove('hidden');
        loadingIndicator.style.display = 'flex'; // Fix Tailwind hidden class mapping
        loadingSubText.textContent = `Memproses Halaman ${pageNum}...`;

        try {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            const base64Data = dataUrl.split(',')[1];

            let finalPrompt = stylePrompts[styleSelect];

            if (styleSelect === 'klasik' && currentFileType === 'pdf' && pageNum > 1) {
                const prevPageKey = (pageNum - 1).toString();
                if (allTranslations[currentFileName] && allTranslations[currentFileName][prevPageKey]) {
                    const prevText = allTranslations[currentFileName][prevPageKey];
                    finalPrompt += `\n\nKonteks Halaman Sebelumnya (HANYA UNTUK REFERENSI SAMBUNGAN KALIMAT):\n"""\n${prevText}\n"""\nJika kalimat awal terpotong, sambungkan makna dengan konteks di atas.`;
                    loadingText.textContent = "Menganalisis sambungan paragraf...";
                } else {
                    loadingText.textContent = "AI sedang menerjemahkan...";
                }
            } else {
                loadingText.textContent = "AI sedang menerjemahkan...";
            }

            const parts = [{ text: finalPrompt }, { inline_data: { mime_type: 'image/jpeg', data: base64Data } }];
            const requestBody = { contents: [{ parts: parts }] };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${activeKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            const data = await response.json();

            if (!response.ok) {
                if (response.status === 429 || (data.error?.message && data.error.message.toLowerCase().includes('quota'))) {
                    throw new Error("LIMIT_API");
                }
                throw new Error(data.error?.message || 'Terjadi kesalahan pada respons API.');
            }

            let translatedText = data.candidates[0].content.parts[0].text;
            translatedText = translatedText.replace(/^Berikut (adalah )?terjemahan.*?\n+/i, '');
            translatedText = translatedText.replace(/^Ini (adalah )?terjemahan.*?\n+/i, '');
            translatedText = translatedText.trim();

            outputArea.value = translatedText;

            const pageKey = pageNum.toString();
            allTranslations[currentFileName][pageKey] = translatedText;
            localStorage.setItem('geminiSavedTranslations', JSON.stringify(allTranslations));

            checkSavedTranslation(pageNum);
            loadingIndicator.classList.add('hidden');
            loadingIndicator.style.display = '';
            return true;

        } catch (error) {
            loadingIndicator.classList.add('hidden');
            loadingIndicator.style.display = '';

            if (error.message === "LIMIT_API") {
                if (isAutoTranslating) {
                    loadingSubText.textContent = "API Limit! Beralih ke Key berikutnya...";
                    loadingIndicator.classList.remove('hidden');
                    loadingIndicator.style.display = 'flex';

                    const switched = switchToNextApiKey();
                    if (switched) {
                        await new Promise(r => setTimeout(r, 2000));
                        return await processTranslation();
                    } else {
                        errorMessage.innerHTML = "<strong>CRITICAL ERROR:</strong> Semua API Key telah habis kuota limitnya.";
                        errorMessage.classList.remove('hidden');
                        toggleAutoTranslate(true);
                        return false;
                    }
                } else {
                    errorMessage.textContent = "API Key Anda mencapai limit. Silakan ganti API Key di panel kiri.";
                    errorMessage.classList.remove('hidden');
                    return false;
                }
            }

            console.error('Error:', error);
            errorMessage.textContent = `Gagal: ${error.message}`;
            errorMessage.classList.remove('hidden');
            if (isAutoTranslating) toggleAutoTranslate(true);
            return false;
        }
    }

    // ==========================================
    // AUTO-PILOT LOGIC
    // ==========================================
    async function toggleAutoTranslate(forceStop = false) {
        const btn = document.getElementById('autoTranslateBtn');
        const btnText = document.getElementById('autoBtnText');
        const manualBtn = document.getElementById('translateBtn');
        const fileInput = document.getElementById('fileInput');

        if (isAutoTranslating || forceStop) {
            isAutoTranslating = false;
            btn.classList.remove('from-rose-500', 'to-red-600', 'animate-pulse');
            btn.classList.add('from-brand-600', 'to-violet-600');
            btnText.textContent = 'Mulai Auto-Pilot';

            manualBtn.disabled = false;
            fileInput.disabled = false;
            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('loadingIndicator').style.display = '';
            return;
        }

        isAutoTranslating = true;
        btn.classList.remove('from-brand-600', 'to-violet-600');
        btn.classList.add('from-rose-500', 'to-red-600', 'animate-pulse');
        btnText.textContent = 'Hentikan Auto-Pilot (Berjalan...)';

        manualBtn.disabled = true;
        fileInput.disabled = true;

        await runAutoPilotLoop();
    }

    async function runAutoPilotLoop() {
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadingText = document.getElementById('loadingText');
        const loadingSubText = document.getElementById('loadingSubText');

        while (isAutoTranslating && pageNum <= pdfDoc.numPages) {
            let success = await processTranslation();
            if (!success) break;

            if (pageNum >= pdfDoc.numPages) {
                alert("✅ Tugas selesai! Seluruh halaman dokumen telah diterjemahkan.");
                toggleAutoTranslate(true);
                break;
            }

            loadingIndicator.classList.remove('hidden');
            loadingIndicator.style.display = 'flex';
            loadingText.textContent = "Pendinginan API...";

            for(let i = 5; i > 0; i--) {
                if(!isAutoTranslating) break;
                loadingSubText.textContent = `Melanjutkan ke hal ${pageNum + 1} dalam ${i} detik...`;
                await new Promise(r => setTimeout(r, 1000));
            }

            if(!isAutoTranslating) {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.style.display = '';
                break;
            }

            loadingText.textContent = "Membalik halaman...";
            loadingSubText.textContent = "";
            saveManualEdit();
            pageNum++;
            await renderPage(pageNum);
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    // ==========================================
    // UTILITAS (DOWNLOAD & COPY)
    // ==========================================
    function downloadJSON() {
        saveManualEdit();
        if (!currentFileName || !allTranslations[currentFileName] || Object.keys(allTranslations[currentFileName]).length === 0) return alert('Belum ada terjemahan.');
        const dataToDownload = { nama_file: currentFileName, tanggal_unduh: new Date().toISOString(), terjemahan_per_halaman: allTranslations[currentFileName] };
        const jsonString = JSON.stringify(dataToDownload, null, 4);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Terjemahan_${currentFileName}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function copyToClipboard() {
        const outputArea = document.getElementById('outputArea');
        if(!outputArea.value) return;
        outputArea.select(); outputArea.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(outputArea.value).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '✅ Tersalin!';
            setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
        });
    }
</script>
</body>
